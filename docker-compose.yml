services:
  aetherix:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "8080:80"
    restart: unless-stopped
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "com.aetherix.description=AETHERIX Interplanetary DTN Showcase"
      - "com.aetherix.version=2.0"
