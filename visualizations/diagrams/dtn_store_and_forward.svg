<text x="599" y="356" text-anchor="middle" fill="#00d4ff" font-size="11" font-weight="600" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace">Store &amp; Wait</text>
<text x="599" y="374" text-anchor="middle" fill="#8892a4" font-size="9" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace">Bundle stored safely until next hop available</text>
<rect x="792" y="338" width="356" height="46" rx="6" fill="#d29922" fill-opacity="0.05" stroke="#d29922" stroke-opacity="0.2"/>
<text x="970" y="356" text-anchor="middle" fill="#d29922" font-size="11" font-weight="600" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace">Link Status</text>
<text x="970" y="374" text-anchor="middle" fill="#8892a4" font-size="9" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace">Intermittent links handled gracefully</text>
<rect x="40" y="398" width="1120" height="42" rx="6" fill="#ff6b35" fill-opacity="0.06" stroke="#ff6b35" stroke-opacity="0.2"/>
<text x="600" y="414" text-anchor="middle" fill="#ff6b35" font-size="11" font-weight="600" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace">THREE CONVERGENCE LAYERS</text>
<text x="320" y="432" fill="#8892a4" font-size="10" font-weight="600" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace">LTP (RFC 5326)</text>
<text x="320" y="432" text-anchor="middle" fill="#8892a4" font-size="10" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" dx="40">Deep space, retransmission</text>
<text x="560" y="432" fill="#8892a4" font-size="10" font-weight="600" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace">TCPCL (RFC 7242)</text>
<text x="560" y="432" text-anchor="middle" fill="#8892a4" font-size="10" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" dx="40">Earth ground segment</text>
<text x="800" y="432" fill="#8892a4" font-size="10" font-weight="600" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace">UDP-CL</text>
<text x="800" y="432" text-anchor="middle" fill="#8892a4" font-size="10" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" dx="40">Optical ISL, low latency</text>
