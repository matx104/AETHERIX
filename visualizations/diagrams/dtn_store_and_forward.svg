<text x="600" y="28" text-anchor="middle" fill="#00d4ff" font-size="16" font-weight="700" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" filter="url(#glow)">DTN STORE-AND-FORWARD vs TCP/IP</text>
