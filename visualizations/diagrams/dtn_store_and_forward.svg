<text x="940" y="280" fill="#5a6578" font-size="10" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace">Decrypt (QKD)</text>
<text x="940" y="296" fill="#3fb950" font-size="10" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace">DELIVERED &#x2713;</text>
<rect x="50" y="338" width="356" height="46" rx="6" fill="#3fb950" fill-opacity="0.05" stroke="#3fb950" stroke-opacity="0.2"/>
