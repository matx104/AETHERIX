<text x="722" y="296" fill="#5a6578" font-size="10" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace">CUSTODY: Node C</text>
<line x1="896" y1="265" x2="930" y2="265" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrCyan)"/>
